name: CI
on:
  push:
    branches:
      - "**"
      - "!integrated/**"
      - "!stl-preview-head/**"
      - "!stl-preview-base/**"
      - "!generated"
      - "!codegen/**"
      - "codegen/stl/**"
  pull_request:
    branches-ignore:
      - "stl-preview-head/**"
      - "stl-preview-base/**"

jobs:
  test:
    timeout-minutes: 15
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Check
        run: make check
